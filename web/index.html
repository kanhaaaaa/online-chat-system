<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ChatApp</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0f0f13; --surface:#16161d; --surface2:#1e1e28;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --accent:#6c63ff; --accent2:#a78bfa; --accent-glow:rgba(108,99,255,0.25);
  --green:#22d3a5; --red:#f87171; --amber:#fbbf24;
  --text:#e8e8f0; --text2:#8888aa; --text3:#555570;
  --radius-sm:8px; --sidebar-w:280px; --topbar-h:60px;
  --font:'DM Sans',sans-serif;
}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;height:100vh;font-size:15px;line-height:1.5;}

/* ── Sidebar ── */
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-top{padding:18px 18px 12px;border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.logo-icon{width:34px;height:34px;background:var(--accent);border-radius:10px;display:grid;place-items:center;box-shadow:0 0 18px var(--accent-glow);flex-shrink:0;}
.logo-icon svg{width:18px;height:18px;}
.logo-name{font-size:17px;font-weight:500;letter-spacing:-0.3px;}
.logo-name span{color:var(--accent2);}
.search-box{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;transition:border-color 0.2s;}
.search-box:focus-within{border-color:var(--accent);}
.search-box svg{color:var(--text3);flex-shrink:0;}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:13px;width:100%;}
.search-box input::placeholder{color:var(--text3);}
.sidebar-section-label{font-size:11px;font-weight:500;letter-spacing:1px;color:var(--text3);text-transform:uppercase;padding:14px 18px 6px;}
.contact-list{flex:1;overflow-y:auto;padding-bottom:8px;}
.contact-list::-webkit-scrollbar{width:4px;}
.contact-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.contact-item{display:flex;align-items:center;gap:11px;padding:9px 18px;cursor:pointer;border-left:3px solid transparent;transition:background 0.15s,border-color 0.15s;}
.contact-item:hover{background:var(--surface2);}
.contact-item.active{background:rgba(108,99,255,0.1);border-left-color:var(--accent);}
.avatar{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-size:14px;font-weight:500;flex-shrink:0;position:relative;}
.avatar-a{background:rgba(108,99,255,0.25);color:var(--accent2);}
.avatar-b{background:rgba(34,211,165,0.2);color:var(--green);}
.avatar-c{background:rgba(251,191,36,0.2);color:var(--amber);}
.avatar-d{background:rgba(248,113,113,0.2);color:var(--red);}
.status-dot{position:absolute;bottom:1px;right:1px;width:9px;height:9px;border-radius:50%;border:2px solid var(--surface);}
.online{background:var(--green);}.offline{background:var(--text3);}.away{background:var(--amber);}
.contact-info{flex:1;min-width:0;}
.contact-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.contact-preview{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.contact-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.contact-time{font-size:11px;color:var(--text3);}
.unread-badge{background:var(--accent);color:#fff;font-size:10px;font-weight:500;padding:1px 6px;border-radius:20px;min-width:18px;text-align:center;}
.sidebar-bottom{border-top:1px solid var(--border);padding:12px 18px;display:flex;align-items:center;gap:10px;}
.me-avatar{width:34px;height:34px;border-radius:50%;background:rgba(108,99,255,0.3);display:grid;place-items:center;font-size:13px;font-weight:500;color:var(--accent2);flex-shrink:0;}
.me-info{flex:1;min-width:0;}
.me-name{font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;}
.me-status{font-size:11px;color:var(--green);}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:6px;display:grid;place-items:center;transition:color 0.15s,background 0.15s;}
.icon-btn:hover{color:var(--text);background:var(--surface2);}
.ws-badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;}
.ws-connected{background:rgba(34,211,165,0.15);color:var(--green);}
.ws-disconnected{background:rgba(248,113,113,0.15);color:var(--red);}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg);}
.topbar{height:var(--topbar-h);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;background:var(--surface);flex-shrink:0;}
.topbar-avatar{position:relative;}
.topbar-info{flex:1;}
.topbar-name{font-size:15px;font-weight:500;}
.topbar-sub{font-size:12px;}
.topbar-actions{display:flex;gap:4px;}

/* ── Messages ── */
.messages-area{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:2px;}
.messages-area::-webkit-scrollbar{width:4px;}
.messages-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.day-divider{display:flex;align-items:center;gap:12px;margin:12px 0 10px;color:var(--text3);font-size:11px;text-transform:uppercase;letter-spacing:0.5px;}
.day-divider::before,.day-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.msg-row{display:flex;align-items:flex-end;gap:8px;animation:fadeUp 0.2s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.msg-row.me{flex-direction:row-reverse;}
.msg-row.gap-above{margin-top:10px;}
.msg-avatar{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:600;flex-shrink:0;align-self:flex-end;}
.msg-col{display:flex;flex-direction:column;max-width:65%;min-width:0;}
.msg-row.me .msg-col{align-items:flex-end;}
.sender-label{font-size:10px;font-weight:600;color:var(--text2);margin-bottom:2px;padding:0 2px;}
.bubble{display:inline-block;padding:9px 14px;border-radius:18px;font-size:14px;line-height:1.55;word-break:break-word;overflow-wrap:break-word;white-space:pre-wrap;}
.bubble.them{background:var(--surface2);color:var(--text);border-bottom-left-radius:4px;}
.bubble.me{background:var(--accent);color:#fff;border-bottom-right-radius:4px;box-shadow:0 3px 14px var(--accent-glow);}
.bubble-meta{font-size:10px;color:var(--text3);margin-top:3px;padding:0 2px;}
.msg-row.me .bubble-meta{text-align:right;}

/* Typing */
.typing-row{display:flex;align-items:flex-end;gap:8px;margin-top:10px;}
.typing-bubble{background:var(--surface2);border-radius:18px;border-bottom-left-radius:4px;padding:10px 14px;display:flex;gap:5px;align-items:center;}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:tdot 1.2s infinite;}
.typing-dot:nth-child(2){animation-delay:0.2s;}
.typing-dot:nth-child(3){animation-delay:0.4s;}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:0.35;}30%{transform:translateY(-5px);opacity:1;}}

/* ── Input ── */
.input-bar{border-top:1px solid var(--border);padding:12px 20px;display:flex;gap:10px;align-items:flex-end;background:var(--surface);flex-shrink:0;}
.input-wrap{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:22px;display:flex;align-items:flex-end;padding:8px 14px;gap:8px;transition:border-color 0.2s;}
.input-wrap:focus-within{border-color:var(--accent);}
.msg-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:14px;resize:none;max-height:120px;line-height:1.5;padding:0;}
.msg-input::placeholder{color:var(--text3);}
.attach-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:2px;display:grid;place-items:center;transition:color 0.15s;flex-shrink:0;}
.attach-btn:hover{color:var(--accent2);}
.send-btn{width:40px;height:40px;background:var(--accent);border:none;border-radius:50%;cursor:pointer;display:grid;place-items:center;flex-shrink:0;transition:transform 0.15s,box-shadow 0.15s;box-shadow:0 4px 16px var(--accent-glow);}
.send-btn:hover{transform:scale(1.08);box-shadow:0 6px 22px var(--accent-glow);}
.send-btn:active{transform:scale(0.95);}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

/* ── Right panel ── */
.right-panel{width:240px;border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;flex-shrink:0;}
.panel-header{padding:18px 16px 12px;border-bottom:1px solid var(--border);font-size:13px;font-weight:500;color:var(--text2);}
.profile-section{padding:20px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.profile-big-av{width:60px;height:60px;border-radius:50%;display:grid;place-items:center;font-size:22px;font-weight:500;}
.profile-big-name{font-size:15px;font-weight:500;}
.profile-big-tag{font-size:12px;color:var(--text2);}
.profile-stat-row{display:flex;border-top:1px solid var(--border);width:100%;}
.stat-cell{flex:1;padding:10px 0;text-align:center;border-right:1px solid var(--border);}
.stat-cell:last-child{border-right:none;}
.stat-num{font-size:16px;font-weight:500;}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:1px;}
.media-grid{padding:12px 16px;display:grid;grid-template-columns:repeat(3,1fr);gap:4px;}
.media-thumb{aspect-ratio:1;background:var(--surface2);border-radius:6px;display:grid;place-items:center;font-size:18px;cursor:pointer;border:1px solid var(--border);transition:border-color 0.15s;}
.media-thumb:hover{border-color:var(--accent);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:10px 20px;border-radius:30px;font-size:13px;box-shadow:0 8px 32px rgba(0,0,0,0.5);transition:transform 0.3s ease;z-index:100;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.dot-green{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:5px;}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-top">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>

<script>
/* ═══════════════════════════════════════════════════════
   CRITICAL FUNCTION — parseMessage()

   Your Java server (ChatWebSocketServer.java) does:
     client.send(message)  ← broadcasts whatever it receives, unchanged.

   The problem: a previous version of the HTML was sending:
     {"text": {"sender":"...","message":"hi"}, "isMe": false}

   So the server echoes THAT nested JSON back.
   This function handles EVERY possible shape:

   Shape A (current/correct): {"sender":"User_X","message":"hi"}
   Shape B (old nested):      {"text":{"sender":"...","message":"hi"},"isMe":false}
   Shape C (double-string):   {"text":"{\"sender\":\"...\",\"message\":\"hi\"}","isMe":false}
   Shape D (plain text):      "hello world"

   Returns: { sender: string, message: string }
═══════════════════════════════════════════════════════ */
function parseMessage(raw) {
  // Default fallback
  let sender  = 'User';
  let message = raw;

  // Not JSON at all → plain text message
  if (typeof raw !== 'string' || !raw.trim().startsWith('{')) {
    return { sender, message: raw };
  }

  let obj;
  try { obj = JSON.parse(raw); } catch { return { sender, message: raw }; }

  // Shape A: { sender, message } — clean format
  if (typeof obj.sender === 'string' && typeof obj.message === 'string') {
    return { sender: obj.sender, message: obj.message };
  }

  // Shape B or C: { text: ..., isMe: ... }
  // "text" could be a nested object OR a JSON string
  if (obj.text !== undefined) {
    let inner = obj.text;

    // Shape C: text is a JSON string — parse it
    if (typeof inner === 'string' && inner.trim().startsWith('{')) {
      try { inner = JSON.parse(inner); } catch { /* keep as string */ }
    }

    // Now inner could be an object { sender, message } (Shape B unwrapped / C unwrapped)
    if (inner && typeof inner === 'object') {
      sender  = inner.sender  || inner.username || 'User';
      message = inner.message || inner.text     || JSON.stringify(inner);
      return { sender, message };
    }

    // inner is a plain string
    if (typeof inner === 'string') {
      return { sender, message: inner };
    }
  }

  // Fallback: try common field names
  sender  = obj.sender   || obj.username || obj.from || 'User';
  message = obj.message  || obj.text     || obj.msg  || raw;
  return { sender, message };
}

/* ═══════════════════════════════════════════════════════
   IDENTITY — unique per browser tab
═══════════════════════════════════════════════════════ */
const USERNAME = 'User_' + Math.floor(Math.random() * 9000 + 1000);

/* ═══════════════════════════════════════════════════════
   DATA
═══════════════════════════════════════════════════════ */
const contacts = [
  { id:1, name:'Riya Kapoor',  initials:'RK', cls:'avatar-b', status:'online',  preview:'Tap to start chatting',        time:'now', unread:0 },
  { id:2, name:'Arjun Mehta', initials:'AM', cls:'avatar-a', status:'online',  preview:'Can you share the file again?', time:'18m', unread:3 },
  { id:3, name:'Sneha Verma', initials:'SV', cls:'avatar-c', status:'away',    preview:"I'll check and let you know.",  time:'1h',  unread:0 },
  { id:4, name:'Dev Sharma',  initials:'DS', cls:'avatar-d', status:'offline', preview:'See you tomorrow!',             time:'3h',  unread:0 },
  { id:5, name:'Priya Nair',  initials:'PN', cls:'avatar-b', status:'online',  preview:'Thanks for the help!',         time:'5h',  unread:1 },
  { id:6, name:'Karan Singh', initials:'KS', cls:'avatar-a', status:'offline', preview:'Got it, noted.',               time:'1d',  unread:0 },
];
const avatarBgs = { 'avatar-a':'rgba(108,99,255,0.25)','avatar-b':'rgba(34,211,165,0.2)','avatar-c':'rgba(251,191,36,0.2)','avatar-d':'rgba(248,113,113,0.2)' };
const avatarFgs = { 'avatar-a':'#a78bfa','avatar-b':'#22d3a5','avatar-c':'#fbbf24','avatar-d':'#f87171' };

let activeId = 1, msgCount = 0;

/* DOM refs — declared ONCE */
const msgInput = document.getElementById('msg-input');
const sendBtn  = document.getElementById('send-btn');
const wsBadge  = document.getElementById('ws-badge');
const msgsArea = document.getElementById('messages-area');

/* ═══════════════════════════════════════════════════════
   WEBSOCKET
═══════════════════════════════════════════════════════ */
let socket = null;

function connectWebSocket() {
  try { socket = new WebSocket('ws://127.0.0.1:8080'); }
  catch(e) { enterDemoMode(); return; }

  socket.onopen = () => {
    console.log('✅ WS connected | You are:', USERNAME);
    wsBadge.textContent = 'Connected';
    wsBadge.className   = 'ws-badge ws-connected';
    enableInput(true);
  };

  socket.onmessage = (event) => {
    /*
     * ─── STEP 1: extract sender + message using bulletproof parser ───
     * This handles ALL old and new JSON shapes.
     */
    const { sender, message } = parseMessage(event.data);

    /*
     * ─── STEP 2: skip our own echo ───
     * Java server broadcasts to ALL clients including sender.
     * We already rendered our bubble in sendMessage(), so skip.
     */
    if (sender === USERNAME) return;

    /*
     * ─── STEP 3: render incoming bubble ───
     */
    const cls = pickAvatarCls(sender);
    appendBubble(message, false, toInitials(sender), cls, sender);

    const c = contacts.find(x => x.id === activeId);
    if (c) { c.preview = message; renderContacts(contacts); }
  };

  socket.onclose = () => {
    wsBadge.textContent = 'Offline';
    wsBadge.className   = 'ws-badge ws-disconnected';
    enableInput(false);
    msgInput.placeholder = 'Disconnected — refresh to reconnect';
  };

  socket.onerror = () => { /* onclose fires right after */ };
}

function enterDemoMode() {
  wsBadge.textContent  = 'Demo';
  wsBadge.className    = 'ws-badge ws-disconnected';
  enableInput(true);
  msgInput.placeholder = 'Demo mode — server is offline';
  showToast('Server offline — running in demo mode');
}

function enableInput(on) {
  msgInput.disabled = !on;
  sendBtn.disabled  = !on;
  if (on) msgInput.placeholder = 'Type a message…';
}

/* ═══════════════════════════════════════════════════════
   SEND MESSAGE
   Sends ONLY: { sender, message }
   — no "text", no "isMe", no nesting.
   Server echoes it back → onmessage skips it (sender check).
═══════════════════════════════════════════════════════ */
function sendMessage() {
  const text = msgInput.value.trim();
  if (!text) return;

  /* Show our bubble on the RIGHT immediately */
  appendBubble(text, true, 'YO', 'avatar-a', USERNAME);
  msgCount++;
  document.getElementById('panel-msgs').textContent = msgCount;

  const c = contacts.find(x => x.id === activeId);
  if (c) { c.preview = text; renderContacts(contacts); }

  msgInput.value        = '';
  msgInput.style.height = 'auto';

  /* Send clean JSON to server */
  if (socket && socket.readyState === WebSocket.OPEN) {
    socket.send(JSON.stringify({
      sender:  USERNAME,   // ← server echoes this; onmessage uses it to skip
      message: text        // ← just the text string, nothing nested
    }));
  }
}

/* ═══════════════════════════════════════════════════════
   RENDER BUBBLE
═══════════════════════════════════════════════════════ */
function appendBubble(text, isMe, avatarTxt, avatarCls, fullName) {
  const time = new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  const bg   = avatarBgs[avatarCls] || avatarBgs['avatar-b'];
  const fg   = avatarFgs[avatarCls] || avatarFgs['avatar-b'];

  const row  = document.createElement('div');
  row.className = `msg-row ${isMe?'me':''} gap-above`;

  row.innerHTML = `
    ${!isMe ? `<div class="msg-avatar" style="background:${bg};color:${fg};">${esc(avatarTxt)}</div>` : ''}
    <div class="msg-col">
      ${!isMe ? `<div class="sender-label">${esc(fullName||avatarTxt)}</div>` : ''}
      <div class="bubble ${isMe?'me':'them'}">${esc(text)}</div>
      <div class="bubble-meta">${time}</div>
    </div>`;

  msgsArea.appendChild(row);
  msgsArea.scrollTop = msgsArea.scrollHeight;
}

/* ═══════════════════════════════════════════════════════
   CONTACTS / TOPBAR / PANEL
═══════════════════════════════════════════════════════ */
function renderContacts(list) {
  document.getElementById('contact-list').innerHTML = list.map(c=>`
    <div class="contact-item ${c.id===activeId?'active':''}" onclick="openChat(${c.id})">
      <div class="avatar ${c.cls}" style="position:relative;">
        ${c.initials}<div class="status-dot ${c.status}"></div>
      </div>
      <div class="contact-info">
        <div class="contact-name">${c.name}</div>
        <div class="contact-preview">${c.preview}</div>
      </div>
      <div class="contact-meta">
        <div class="contact-time">${c.time}</div>
        ${c.unread?`<div class="unread-badge">${c.unread}</div>`:''}
      </div>
    </div>`).join('');
}

function filterContacts(q) {
  renderContacts(contacts.filter(c=>c.name.toLowerCase().includes(q.toLowerCase())));
}

function openChat(id) {
  activeId=id; msgCount=0;
  const c=contacts.find(x=>x.id===id);
  c.unread=0;
  renderContacts(contacts);

  document.getElementById('topbar-name').textContent=c.name;
  const av=document.getElementById('topbar-av');
  av.textContent=c.initials;
  av.style.cssText=`width:36px;height:36px;font-size:13px;border-radius:50%;display:grid;place-items:center;font-weight:500;background:${avatarBgs[c.cls]};color:${avatarFgs[c.cls]};`;
  document.getElementById('topbar-dot').className=`status-dot ${c.status}`;
  const sub=document.getElementById('topbar-sub');
  if(c.status==='online'){sub.textContent='Active now';sub.style.color='#22d3a5';}
  else if(c.status==='away'){sub.textContent='Away';sub.style.color='#fbbf24';}
  else{sub.textContent='Offline';sub.style.color='#555570';}

  const pav=document.getElementById('panel-av');
  pav.textContent=c.initials;
  pav.style.cssText=`width:60px;height:60px;border-radius:50%;display:grid;place-items:center;font-size:22px;font-weight:500;background:${avatarBgs[c.cls]};color:${avatarFgs[c.cls]};`;
  document.getElementById('panel-name').textContent=c.name;
  document.getElementById('panel-tag').textContent=`@${c.name.split(' ')[0].toLowerCase()} · ${c.status[0].toUpperCase()+c.status.slice(1)}`;
  document.getElementById('panel-msgs').textContent=0;

  msgsArea.innerHTML=`<div class="day-divider">Today — ${c.name}</div>`;
}

function clearChat() {
  msgsArea.innerHTML=`<div class="day-divider">Chat cleared</div>`;
  msgCount=0; document.getElementById('panel-msgs').textContent=0;
  showToast('Chat cleared');
}

/* ═══════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════ */
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toInitials(n){const p=String(n).split(/[\s_]+/).filter(Boolean);return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():String(n).slice(0,2).toUpperCase();}

const clsPool=['avatar-b','avatar-c','avatar-d','avatar-a'];
const clsMap={};let clsIdx=0;
function pickAvatarCls(s){if(!clsMap[s]){clsMap[s]=clsPool[clsIdx++%clsPool.length];}return clsMap[s];}

let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

/* ═══ INIT ═══ */
renderContacts(contacts);
openChat(1);
connectWebSocket();
</script>
</body>
</html>
